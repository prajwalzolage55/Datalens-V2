services:
  - type: web
    name: datalens-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 4 -b 0.0.0.0:$PORT run:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: MAX_UPLOAD_MB
        value: "50"
